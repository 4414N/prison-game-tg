<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тюряга: Возрождение</title>
    <!-- Подключаем скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #222);
            color: var(--tg-theme-text-color, #fff);
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: var(--tg-theme-secondary-bg-color, #333);
            padding: 10px;
            border-bottom: 2px solid #555;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-weight: bold;
        }
        .cell-image {
            width: 100%;
            height: 250px;
            background-color: #444; /* Сюда потом вставим картинку камеры */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #555;
        }
        .action-btn {
            background-color: var(--tg-theme-button-color, #d32f2f);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            width: 80%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="username">Зек...</h2>
        <div class="stats">
            <div>👑 <span id="auth">0</span></div>
            <div>🚬 <span id="cigs">0</span></div>
            <div>⚡ <span id="energy">100</span>/100</div>
        </div>
    </div>

    <div class="cell-image">
        <p>[Здесь будет арт камеры и твоего персонажа]</p>
    </div>

    <button class="action-btn" onclick="doJob()">Сделать ходку (-10 ⚡)</button>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // Получаем данные игрока из Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name;
        }

        // Заглушка для механики (позже это будет идти через сервер)
        let cigs = 0;
        let auth = 0;
        let energy = 100;

        function doJob() {
            if (energy >= 10) {
                energy -= 10;
                cigs += 5;
                auth += 2;
                
                document.getElementById('cigs').innerText = cigs;
                document.getElementById('auth').innerText = auth;
                document.getElementById('energy').innerText = energy;
                
                // Вибрация телефона при успешном действии!
                tg.HapticFeedback.impactOccurred('medium'); 
            } else {
                tg.showAlert("Браток, энергия на нуле. Жди.");
            }
        }
    </script>
</body>
</html>
